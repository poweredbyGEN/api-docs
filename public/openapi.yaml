  # ── Agent Core (GEN-2755) ─────────────────────────────────
  /agents/{agent_id}/core:
    get:
      operationId: getAgentCore
      summary: Get the full agent setup
      description: |
        Returns every section of the agent setup canvas in a single response:
        identity, overview, personality, inspiration, voice, look, accounts.
      tags: [Agent Core]
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Full agent setup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentCore'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: patchAgentCore
      summary: Update any combination of setup sections
      description: |
        Merge semantics for `identity`, `overview`, `look.description`. Replace
        semantics for `personality`, `inspiration`, `voice`, `accounts`. Returns
        200 on full success, 207 Multi-Status with per-section results on
        partial failure.
      tags: [Agent Core]
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCorePatch'
      responses:
        '200':
          description: All sections updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentCorePatchResult'
        '207':
          description: Partial success — inspect per-section status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentCorePatchResult'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /agents/{agent_id}/core/identity/profile-photo:
    post:
      operationId: uploadAgentCoreProfilePhoto
      summary: Upload agent profile photo
      description: Multipart upload. Proxied to the Rails agents endpoint; returns the CDN URL.
      tags: [Agent Core]
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required: [file]
      responses:
        '200':
          description: Uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile_photo_url: { type: string }

  /agents/{agent_id}/core/inspiration:
    post:
      operationId: addAgentInspiration
      summary: Add one inspiration source
      tags: [Agent Core]
      parameters:
        - name: agent_id
          in: path
          required: true
