              properties:
                url: { type: string }
                platform: { type: string, enum: [tiktok, instagram, youtube, x, linkedin, pinterest, facebook, threads, website] }
              required: [url]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InspirationItem' }

  /agents/{agent_id}/core/inspiration/{item_id}:
    delete:
      operationId: removeAgentInspiration
      summary: Remove one inspiration source
      tags: [Agent Core]
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: string } }
        - { name: item_id, in: path, required: true, schema: { type: integer } }
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /agents/{agent_id}/core/accounts:
    post:
      operationId: addAgentAccount
      summary: Add one of the agent's own social accounts
      tags: [Agent Core]
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string }
                platform: { type: string }
                display_name: { type: string }
              required: [url]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AccountItem' }

  /agents/{agent_id}/core/accounts/{account_id}:
    delete:
      operationId: removeAgentAccount
      summary: Remove one linked account
      tags: [Agent Core]
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: string } }
        - { name: account_id, in: path, required: true, schema: { type: integer } }
      responses:
        '204': { description: Deleted }

  /agents/{agent_id}/core/look/reference-images:
    post:
      operationId: addLookReferenceImage
      summary: Add a look reference image URL
      tags: [Agent Core]
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string }
              required: [url]
      responses:
        '201':
          description: Created

  /agents/{agent_id}/core/look/reference-images/{image_id}:
    delete:
      operationId: removeLookReferenceImage
      summary: Remove a look reference image
      tags: [Agent Core]
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: string } }
        - { name: image_id, in: path, required: true, schema: { type: integer } }
      responses:
        '204': { description: Deleted }

  # ── Agent Voice (GEN-2755) ────────────────────────────────
  /agents/{agent_id}/voice/library:
    get:
      operationId: listAgentVoices
      summary: List voices available to the agent
      description: |
        Merges four sources: `public` (shared catalog), `user_designed`
        (via the 4-step design flow), `user_trained` (cloned from audio),
        and `user_elevenlabs` (from the user's connected ElevenLabs account).
      tags: [Agent Voice]
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: string } }
        - name: source
          in: query
          schema:
            type: string
            enum: [public, user_designed, user_trained, user_elevenlabs]
      responses:
        '200':
          description: Voice list
          content:
            application/json:
              schema:
                type: object
                properties:
                  voices:
                    type: array
                    items: { $ref: '#/components/schemas/VoiceLibraryItem' }
                  total: { type: integer }

  /agents/{agent_id}/voice/integrations/elevenlabs:
    get:
      operationId: getElevenLabsIntegrationStatus
      summary: Check whether the agent has an ElevenLabs key connected
      tags: [Agent Voice]
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  connected: { type: boolean }
                  masked_key: { type: string, nullable: true }
    post:
      operationId: connectElevenLabs
      summary: Connect the user's ElevenLabs API key
      description: Validates the key against ElevenLabs /v1/user before saving it on the agent record.
      tags: [Agent Voice]
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                api_key: { type: string }
              required: [api_key]
      responses:
        '200':
          description: Connected
        '400':
          description: invalid_key
    delete:
      operationId: disconnectElevenLabs
      summary: Remove the ElevenLabs key from the agent
      tags: [Agent Voice]
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: string } }
      responses:
        '204': { description: Disconnected }

  /agents/{agent_id}/voice/integrations/elevenlabs/test:
    post:
      operationId: testElevenLabsKey
      summary: Test an ElevenLabs key without saving it
      tags: [Agent Voice]
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: { api_key: { type: string } }
              required: [api_key]
      responses:
        '200':
          description: Tested
          content:
            application/json:
              schema:
                type: object
                properties: { valid: { type: boolean } }

  /agents/{agent_id}/voice/design/generate-script:
    post:
      operationId: generateVoiceScript
      summary: "Voice design step 1/4 — generate a read-aloud script"
      tags: [Agent Voice]
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                language: { type: string }
      responses:
        '200':
          description: Script
          content:
            application/json:
              schema:
                type: object
                properties: { voice_sample: { type: string } }

  /agents/{agent_id}/voice/design/generate-description:
    post:
      operationId: generateVoiceDescription
      summary: "Voice design step 2/4 — generate style descriptors"
      tags: [Agent Voice]
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                gender: { type: string }
                voice_description: { type: string }
                language: { type: string }
                script: { type: string }
              required: [gender]
      responses:
        '200':
          description: Description
          content:
            application/json:
              schema:
                type: object
                properties: { voice_description: { type: string } }

  /agents/{agent_id}/voice/design/generate-samples:
    post:
      operationId: generateVoiceSamples
      summary: "Voice design step 3/4 — generate 3 candidate audio samples"
      tags: [Agent Voice]
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text: { type: string }
                description: { type: string }
              required: [text]
      responses:
        '200':
          description: Candidates
          content:
            application/json:
              schema:
                type: object
                properties:
                  samples:
                    type: array
                    items:
                      type: object
                      properties:
                        generation_id: { type: string }
                        audio: { type: string, description: "Base64-encoded audio bytes" }

  /agents/{agent_id}/voice/design:
    post:
      operationId: finalizeDesignedVoice
      summary: "Voice design step 4/4 — finalize"
      description: "Persists a designed voice by picking one of the generation_id values from step 3."
      tags: [Agent Voice]
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                generation_id: { type: string }
                name: { type: string }
                gender: { type: string }
                language: { type: string }
                description: { type: string }
              required: [generation_id, name]
      responses:
        '201':
          description: Voice created

  /agents/{agent_id}/voice/clone:
    post:
      operationId: cloneVoice
      summary: Clone a voice from an existing audio sample
      description: |
        Synchronous. Provide exactly one of `audio_url` (preferred — server
        downloads) or `audio_base64` (inline bytes for small clips).
      tags: [Agent Voice]
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                audio_url: { type: string, format: uri }
                audio_base64: { type: string }
                gender: { type: string }
                language: { type: string }
                description: { type: string }
              required: [name]
      responses:
        '201':
          description: Voice cloned

  /agents/{agent_id}/voice/{voice_id}:
    delete:
      operationId: deleteAgentVoice
      summary: Delete a user-owned voice
      tags: [Agent Voice]
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: string } }
        - { name: voice_id, in: path, required: true, schema: { type: string } }
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /agents/{agent_id}/voice/{voice_id}/preview:
    post:
      operationId: previewVoice
      summary: "Enqueue a TTS preview job (async)"
      description: |
        Returns `{user_job_id}` immediately. Poll
        `GET /v1/agents/{agent_id}/voice/preview/{job_id}` until
        `status == "completed"`, then read the audio URL from
        `output_resources`.
      tags: [Agent Voice]
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: string } }
        - { name: voice_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text: { type: string }
              required: [text]
      responses:
        '202':
          description: Job enqueued
          content:
            application/json:
              schema:
                type: object
                properties: { user_job_id: { type: integer } }

  /agents/{agent_id}/voice/preview/{job_id}:
    get:
      operationId: getVoicePreviewStatus
      summary: Poll a TTS preview job
      tags: [Agent Voice]
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: string } }
        - { name: job_id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: User job record

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: Personal Access Token (PAT). Create one in Settings > API Keys.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Clerk/Dynamic XYZ JWT token.

  parameters:
    AgentId:
      name: agent_id
      in: query
      required: true
      description: The agent ID. Find via `GET /v1/agents`.
      schema:
        type: string
    AgentIdPath:
      name: agent_id
      in: path
      required: true
      schema:
        type: string
    SheetId:
      name: sheet_id
      in: path
      required: true
      schema:
        type: string
    RowId:
      name: row_id
      in: path
      required: true
      schema:
        type: string
    CellId:
      name: cell_id
      in: path
      required: true
      schema:
        type: string
    LayerId:
      name: layer_id
      in: path
      required: true
      schema:
        type: string
    TokenId:
      name: id
      in: path
      required: true
      schema:
        type: string

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        username:
          type: string
        created_at:
          type: string

    Workspace:
      type: object
      properties:
        id:
          type: string
        name:
          type: string

    Agent:
      type: object
      properties:
        id:
          type: string
        name:
          type: string

    ApiKey:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        token_type:
          type: string
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true
        last_used_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [active, expired, revoked]

    Sheet:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        title:
          type: string
        project_type:
          type: string
        is_default:
          type: boolean
        uuid:
          type: string
        status:
          type: string
        created_at:
          type: integer
          description: Unix timestamp (seconds)
        created_at_ts:
          type: integer
          description: Unix timestamp (milliseconds)
        updated_at_ts:
          type: integer
          description: Unix timestamp (milliseconds)
        spreadsheet_columns:
          type: array
          items:
            $ref: '#/components/schemas/Column'
        spreadsheet_rows:
          type: array
          items:
            $ref: '#/components/schemas/Row'
        global_variables_sheet:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Sheet'

    Row:
      type: object
      properties:
        id:
          type: string
        position:
          type: integer
        additional_attributes:
          type: object
        created_at_ts:
          type: integer
        updated_at_ts:
          type: integer
        spreadsheet_cells:
          type: array
          items:
            $ref: '#/components/schemas/Cell'
        execution_cost:
          type: string
          nullable: true
          description: Total credit cost (only when `with_execution_cost=true`).

    Column:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        temp_title:
          type: string
          nullable: true
        type:
          type: string
        column_role:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        position:
          type: integer
        additional_attributes:
          type: object
        created_at_ts:
          type: integer
        updated_at_ts:
          type: integer

    Cell:
      type: object
      properties:
        id:
          type: string
        value:
          type: string
          nullable: true
        additional_attributes:
          type: object
        cell_role:
          type: string
          nullable: true
        created_at_ts:
          type: integer
        updated_at_ts:
          type: integer
        default_user_job:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Generation'
        user_jobs:
          type: array
          items:
            $ref: '#/components/schemas/Generation'
        video_layers:
          type: array
          items:
            $ref: '#/components/schemas/Layer'
        execution_cost:
          type: string
          nullable: true

    Layer:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        position:
          type: integer
        type:
          type: string
        additional_attributes:
          type: object
        created_at_ts:
          type: integer
        updated_at_ts:
          type: integer
        default_user_job:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Generation'
        user_jobs:
          type: array
          items:
            $ref: '#/components/schemas/Generation'
        execution_cost:
          type: string
          nullable: true

    Generation:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed, stopped]
        user_job_type:
          type: string
        result:
          type: object
          nullable: true
        failed_reason:
          type: string
          nullable: true
        output_resources:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              url:
                type: string
                format: uri
              thumbnail_url:
                type: string
                format: uri
                nullable: true
              object_type:
                type: string
                description: '"Video", "Image", etc.'
              type:
                type: string
        execution_cost:
          type: string
          nullable: true

    AutomationConfig:
      type: object
      properties:
        webhook_url:
          type: string
          format: uri
          nullable: true
        callback_url:
          type: string
          format: uri
          nullable: true
        polling_enabled:
          type: boolean

    Template:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        title:
          type: string
        name:
          type: string
        description:
          type: string
        cover:
          type: string
          format: uri
          nullable: true
        tutorial_url:
          type: string
          format: uri
          nullable: true
        tags:
          type: array
          items:
            type: string
        recent_generated_contents:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
              thumbnail_url:
                type: string
                format: uri

    AgentDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        organization_id:
          type: string
        time_zone:
          type: string
          nullable: true
        primary_avatar_id:
          type: string
          nullable: true
        primary_avatar_url:
          type: string
          format: uri
          nullable: true
        agent_setup_project_id:
          type: string
          nullable: true
        role:
          type: string
        default_user_voice:
          type: object
          nullable: true
          properties:
            id:
              type: string
            name:
              type: string
            gender:
              type: string
            language:
              type: string
            provider:
              type: string
            url:
              type: string
              format: uri

    Avatar:
      type: object
      properties:
        id:
          type: string
        is_primary:
          type: boolean
        url:
          type: string
          format: uri
        thumbnail_url:
          type: string
          format: uri
          nullable: true
        degod_avatar_id:
          type: string
          nullable: true

    Organization:
      type: object
      properties:
        id:
          type: string
        uuid:
          type: string
        organization_id:
          type: string
        name:
          type: string
        avatar:
          type: object
          nullable: true
          properties:
            url:
              type: string
              format: uri
            thumbnail_url:
              type: string
              format: uri
        user_role:
          type: string
        credit:
          type: number
        available_credit:
          type: object
          properties:
            generic:
              type: number
            aura:
              type: number
        total_members:
          type: integer
        credit_plan:
          type: object
          nullable: true
          properties:
            id:
              type: string
            name:
              type: string
            cycle:
              type: string

    ContentResource:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
          format: uri
        thumbnail_url:
          type: string
          format: uri
          nullable: true
        file_name:
          type: string
        content_type:
          type: string

    DirectUpload:
      type: object
      properties:
        id:
          type: string
        key:
          type: string
        filename:
          type: string
        content_type:
          type: string
        byte_size:
          type: integer
        checksum:
          type: string
        signed_id:
          type: string
          description: Use this as `content_resource[file]` when creating a content resource.
        direct_upload:
          type: object
          properties:
            url:
              type: string
              format: uri
              description: Pre-signed S3 URL. PUT the file here.
            headers:
              type: object
              properties:
                Content-Type:
                  type: string
                Content-MD5:
                  type: string

    AgentProfile:
      type: object
      properties:
        identity:
          type: object
          description: Agent identity configuration (name, persona, backstory).
        voice:
          type: object
          description: Voice and tone settings.
        brand:
          type: object
          description: Brand guidelines, colors, and style.

    AgentProfileInput:
      type: object
      description: All fields are optional. Provide only the sections you want to set.
      properties:
        identity:
          type: object
        voice:
          type: object
        brand:
          type: object

    Conversation:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
          nullable: true
        agent_id:
          type: string
        pinned:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum: [user, assistant, system]
              content:
                type: string
              created_at:
                type: string
                format: date-time

    Idea:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [new, approved, rejected, in_progress, completed]
        agent_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message.
        error_code:
          type: string
          description: Machine-readable error code.

    # ── Agent Core schemas (GEN-2755) ───────────────────────
    AgentCore:
      type: object
      properties:
        identity:
          type: object
          properties:
            name: { type: string, nullable: true }
            profile_photo_url: { type: string, nullable: true }
        overview:
          $ref: '#/components/schemas/BrandOverview'
        personality:
          type: string
          nullable: true
        inspiration:
          type: array
          items: { $ref: '#/components/schemas/InspirationItem' }
        voice:
          type: object
          nullable: true
          properties:
            voice_id: { type: string }
            name: { type: string, nullable: true }
            source: { type: string, enum: [public, user_designed, user_trained, user_elevenlabs] }
        look:
          type: object
          properties:
            description: { type: string, nullable: true }
            reference_images:
              type: array
              items:
                type: object
                properties:
                  id: { type: integer }
                  url: { type: string }
        accounts:
          type: array
          items: { $ref: '#/components/schemas/AccountItem' }

    BrandOverview:
      type: object
      properties:
        agent_id: { type: string }
        brand_name: { type: string, nullable: true }
        description: { type: string, nullable: true }
        identity_type: { type: string, enum: [brand, character], nullable: true }
        goal: { type: string, nullable: true }
        keywords:
          type: array
          items: { type: string }
        target_platforms:
          type: array
          items: { type: string }
        shortform: { type: boolean, nullable: true }
        longform: { type: boolean, nullable: true }
        primary_format: { type: string, nullable: true }
        onboarding_status: { type: string, nullable: true }

    AgentCorePatch:
      type: object
      description: "Any combination of sections. Merge semantics for identity/overview/look.description, replace for personality/inspiration/voice/accounts."
      properties:
        identity:
          type: object
          properties:
            name: { type: string }
            profile_photo_url: { type: string }
        overview:
          type: object
          properties:
            brand_name: { type: string }
            description: { type: string }
            identity_type: { type: string, enum: [brand, character] }
            goal: { type: string }
            keywords: { type: array, items: { type: string } }
            target_platforms: { type: array, items: { type: string } }
            shortform: { type: boolean }
            longform: { type: boolean }
            onboarding_status: { type: string }
        personality: { type: string }
        inspiration:
          type: array
          items:
            type: object
            properties:
              url: { type: string }
              platform: { type: string }
            required: [url]
        look:
          type: object
          properties:
            description: { type: string }
        voice:
          type: object
          properties:
            voice_id: { type: string }
            source: { type: string, enum: [public, user_designed, user_trained, user_elevenlabs] }
        accounts:
          type: array
          items:
            type: object
            properties:
              url: { type: string }
              platform: { type: string }
              display_name: { type: string }
            required: [url]

    AgentCorePatchResult:
      type: object
      description: "Per-section result. status=ok means that section's write succeeded; status=error means it failed (see error field)."
      additionalProperties:
        type: object
        properties:
          status: { type: string, enum: [ok, error] }
          data:
            description: "Section-specific payload on success."
          error:
            type: string
            description: "Error message on failure."

    InspirationItem:
      type: object
      properties:
        id: { type: integer }
        url: { type: string }
        platform: { type: string }

    AccountItem:
      type: object
      properties:
        id: { type: integer }
        agent_id: { type: string }
        url: { type: string }
        platform: { type: string }
        display_name: { type: string, nullable: true }

    VoiceLibraryItem:
      type: object
      properties:
        voice_id: { type: string }
        name: { type: string, nullable: true }
        source: { type: string, enum: [public, user_designed, user_trained, user_elevenlabs] }
        preview_url: { type: string, nullable: true }

  responses:
    Unauthorized:
      description: Missing or invalid authentication.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Unauthorized"
            error_code: "unauthorized"

    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Not found"
            error_code: "not_found"

    CreditRequired:
      description: Active GEN credits required.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "GEN credits are required to use the API."
            error_code: "usable_gen_credit_required"
